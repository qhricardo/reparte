<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma de Repartos con Auth</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { color: #333; border-bottom: 2px solid #00d1b2; padding-bottom: 10px; margin-top: 30px; }
        label { display: block; margin: 10px 0 5px; font-weight: bold; }
        input, select { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background-color: #00d1b2; color: white; border: none; padding: 12px 20px; font-size: 16px; font-weight: bold; border-radius: 4px; cursor: pointer; width: 100%; margin-bottom: 10px; }
        button:hover { background-color: #00b196; }
        .btn-secundario { background-color: #666; }
        .btn-secundario:hover { background-color: #444; }
        
        /* BOTÓN DE GOOGLE ESTILO OFICIAL */
        .btn-google {
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #ffffff;
            color: #1f1f1f;
            border: 1px solid #747775;
            border-radius: 4px;
            padding: 10px 16px;
            font-size: 14px;
            font-weight: 500;
            font-family: "Roboto", arial, sans-serif;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.2s, box-shadow 0.2s;
            margin-top: 15px;
        }
        .btn-google:hover {
            background-color: #f8fafd;
            box-shadow: 0 1px 2px 0 rgba(60,64,67,0.3), 0 1px 3px 1px rgba(60,64,67,0.15);
        }
        .btn-google svg {
            width: 18px;
            height: 18px;
            margin-right: 10px;
        }

        .pedido-card { border: 1px solid #ddd; background: #fafafa; padding: 15px; margin-top: 15px; border-radius: 5px; }
        .oculto { display: none; }
        .user-info { background: #eef9f8; padding: 10px; border-radius: 4px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

<div class="container">
    <!-- 1. SECCIÓN DE AUTENTICACIÓN (LOGIN / REGISTRO) -->
    <div id="seccionAuth">
        <h2>Iniciar Sesión / Registrarse</h2>
        <form id="formAuth" onsubmit="return false;">
            <label for="email">Correo Electrónico:</label>
            <input type="email" id="email" placeholder="correo@ejemplo.com" required>

            <label for="password">Contraseña (Mínimo 6 caracteres):</label>
            <input type="password" id="password" placeholder="******" required>

            <label for="rol">¿Qué eres en la plataforma?:</label>
            <select id="rol">
                <option value="cliente">Quiero pedir envíos (Cliente)</option>
                <option value="repartidor">Quiero trabajar entregando (Repartidor)</option>
            </select>

            <button type="button" id="btnIngresar">Iniciar Sesión</button>
            <button type="button" id="btnRegistrar" class="btn-secundario">Crear Cuenta Nueva</button>
            
            <button type="button" id="btnGoogle" class="btn-google">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
                    <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                    <path fill="#4285F4" d="M46.5 24c0-1.55-.15-3.24-.47-4.77H24v9.03h12.75c-.55 2.87-2.22 5.29-4.72 6.96v5.78h7.63c4.46-4.1 7.04-10.15 7.04-17z"/>
                    <path fill="#FBBC05" d="M10.54 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.98-6.19z"/>
                    <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.63-5.78c-2.11 1.42-4.81 2.3-8.26 2.3-6.26 0-11.57-4.22-13.46-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                </svg>
                Continuar con Google
            </button>
        </form>
    </div>

    <!-- 2. CONTENIDO PRINCIPAL DE LA APP -->
    <div id="seccionApp" class="oculto">
        <div class="user-info">
            <div>
                <span id="txtUsuarioLogueado">Cargando usuario...</span> 
                (<strong id="txtRolUsuario">...</strong>)
            </div>
            <button id="btnCerrarSesion" style="width: auto; padding: 5px 10px; font-size: 12px; margin: 0;" class="btn-secundario">Salir</button>
        </div>

        <!-- VISTA EXCLUSIVA DEL CLIENTE -->
        <div id="vistaCliente" class="oculto">
            <h2>Solicitar un Repartidor</h2>
            <form id="formPedido">
                <label for="origen">Dirección de Recogida (Origen):</label>
                <input type="text" id="origen" placeholder="Ej. Av. Central 123" required>

                <label for="destino">Dirección de Entrega (Destino):</label>
                <input type="text" id="destino" placeholder="Ej. Calle Comercio 456" required>

                <label for="paquete">¿Qué envías?:</label>
                <input type="text" id="paquete" placeholder="Ej. Hamburguesa, Llaves" required>

                <button type="submit">Solicitar Servicio</button>
            </form>
        </div>        

        <!-- VISTA EXCLUSIVA DEL REPARTIDOR -->
        <div id="vistaRepartidor" class="oculto">
            <h2>Pedidos Disponibles (Tiempo Real)</h2>
            <div id="listaPedidos">
                <p>Buscando solicitudes en tu zona...</p>
            </div>
        </div>
    </div>
</div>

<!-- Librería de Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
    // CONFIGURACIÓN (Corregido el método de creación de cliente)
    const SUPABASE_URL = "https://jelhlxjbzbegntfyereb.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_2XGww5rHw0UQ7nvtcODg3A_w_r_hiit";

    // CORRECCIÓN AQUÍ: Se usa window.supabase.createClient para evitar conflictos de variables
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Elementos del DOM
    const seccionAuth = document.getElementById('seccionAuth');
    const seccionApp = document.getElementById('seccionApp');
    const vistaCliente = document.getElementById('vistaCliente');
    const vistaRepartidor = document.getElementById('vistaRepartidor');
    
    let usuarioActual = null;
    let rolActual = null;

    // --- ESCUCHAR CAMBIOS DE SESIÓN ---
    supabaseClient.auth.onAuthStateChange((event, session) => {
        if (session) {
            usuarioActual = session.user;
            rolActual = usuarioActual.user_metadata.rol || 'cliente';
            mostrarPantallaApp();
        } else {
            usuarioActual = null;
            rolActual = null;
            mostrarPantallaAuth();
        }
    });

    function mostrarPantallaApp() {
        seccionAuth.classList.add('oculto');
        seccionApp.classList.remove('oculto');
        document.getElementById('txtUsuarioLogueado').innerText = usuarioActual.email;
        document.getElementById('txtRolUsuario').innerText = rolActual.toUpperCase();

        if (rolActual === 'cliente') {
            vistaCliente.classList.remove('oculto');
            vistaRepartidor.classList.add('oculto');
        } else {
            vistaRepartidor.classList.remove('oculto');
            vistaCliente.classList.add('oculto');
            escucharPedidosRealtime();
        }
    }

    function mostrarPantallaAuth() {
        seccionAuth.classList.remove('oculto');
        seccionApp.classList.add('oculto');
    }

    // --- BOTÓN: CREAR CUENTA NUEVA ---
    document.getElementById('btnRegistrar').addEventListener('click', async () => {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const rol = document.getElementById('rol').value;

        if(!email || !password) return alert("Por favor ingresa correo y contraseña.");

        const { data, error } = await supabaseClient.auth.signUp({
            email: email,
            password: password,
            options: { data: { rol: rol } }
        });

        if (error) alert("Error al registrar: " + error.message);
        else alert("¡Cuenta creada con éxito! Revisa tu correo por si Supabase te envió un email de confirmación.");
    });

    // --- BOTÓN: INICIAR SESIÓN ---
    document.getElementById('btnIngresar').addEventListener('click', async () => {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        if(!email || !password) return alert("Por favor ingresa tu correo y contraseña.");

        const { data, error } = await supabaseClient.auth.signInWithPassword({
            email: email,
            password: password
        });

        if (error) alert("Error de credenciales: " + error.message);
    });

    // --- BOTÓN: CERRAR SESIÓN ---
    document.getElementById('btnCerrarSesion').addEventListener('click', async () => {
        await supabaseClient.auth.signOut();
    });

    // --- BOTÓN: GOOGLE AUTH ---
    document.getElementById('btnGoogle').addEventListener('click', async () => {
        const rol = document.getElementById('rol').value;

        let targetRedirect = window.location.origin + window.location.pathname;
        if (window.location.protocol === 'file:') {
            alert("⚠️ Recuerda: Google Auth necesita que tu app esté subida a internet (como GitHub Pages) o corriendo en un servidor local. Si abres el archivo directo desde tu carpeta, fallará.");
            return;
        }

        const { data, error } = await supabaseClient.auth.signInWithOAuth({
            provider: 'google',
            options: {
                queryParams: { access_type: 'offline', prompt: 'select_account' },
                data: { rol: rol },
                redirectTo: targetRedirect
            }
        });

        if (error) alert("Error al conectar con Google: " + error.message);
    });

    // --- CLIENTE: CREAR PEDIDO ---
    const formPedido = document.getElementById('formPedido');
    formPedido.addEventListener('submit', async (e) => {
        e.preventDefault();

        const origen = document.getElementById('origen').value;
        const destino = document.getElementById('destino').value;
        const paquete = document.getElementById('paquete').value;

        const { error } = await supabaseClient
            .from('pedidos')
            .insert([
                { 
                    origen: origen, 
                    destino: destino, 
                    paquete: paquete, 
                    estado: 'solicitado',
                    cliente_id: usuarioActual.id
                }
            ]);

        if (error) alert("Error al solicitar: " + error.message);
        else {
            alert("¡Pedido solicitado con éxito!");
            formPedido.reset();
        }
    });

    // --- REPARTIDOR: ESCUCHAR EN TIEMPO REAL ---
    let canalRealtime = null;

    function escucharPedidosRealtime() {
        refrescarListaVisual();

        if (canalRealtime) return;

        canalRealtime = supabaseClient
            .channel('cambios-pedidos')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'pedidos' }, () => {
                refrescarListaVisual();
            })
            .subscribe();
    }

    async function refrescarListaVisual() {
        const { data: pedidos, error } = await supabaseClient
            .from('pedidos')
            .select('*')
            .eq('estado', 'solicitado');

        if (error) return;

        const listaPedidosDiv = document.getElementById('listaPedidos');
        listaPedidosDiv.innerHTML = "";

        if (pedidos.length === 0) {
            listaPedidosDiv.innerHTML = "<p>No hay envíos pendientes en este momento.</p>";
            return;
        }

        pedidos.forEach((pedido) => {
            const card = document.createElement('div');
            card.className = 'pedido-card';
            card.innerHTML = `
                <p><strong>📦 Paquete:</strong> ${pedido.paquete}</p>
                <p><strong>📍 Origen:</strong> ${pedido.origen}</p>
                <p><strong>🏁 Destino:</strong> ${pedido.destino}</p>
                <button onclick="aceptarPedido(${pedido.id})">Aceptar Pedido</button>
            `;
            listaPedidosDiv.appendChild(card);
        });
    }

    // --- REPARTIDOR: ACEPTAR PEDIDO ---
    window.aceptarPedido = async function(idPedido) {
        const { error } = await supabaseClient
            .from('pedidos')
            .update({ 
                estado: 'en_camino',
                repartidor_id: usuarioActual.id
            })
            .eq('id', idPedido);

        if (error) alert("Error al aceptar el pedido");
        else alert("¡Pedido aceptado!");
    };
</script>

</body>
</html>
