<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Comercio - Gestión de Productos</title>
    <!-- SDK Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f6f9; }
        .contenedor { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .oculto { display: none !important; }
        .campo { margin-bottom: 15px; }
        .campo label { display: block; margin-bottom: 5px; font-weight: bold; }
        .campo input, .campo textarea { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        button { background-color: #27ae60; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; font-size: 16px; width: 100%; }
        button:hover { background-color: #219150; }
        button:disabled { background-color: #bdc3c7; }
        .tarjeta-prod { border: 1px solid #eee; padding: 10px; margin-top: 10px; border-radius: 6px; display: flex; gap: 10px; align-items: center; }
        .tarjeta-prod img { width: 60px; height: 60px; object-fit: cover; border-radius: 4px; }
        .tarjeta-prod-info { flex-grow: 1; }
        .barra-usuario { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #ddd; }
        .btn-google { background-color: #4285f4; }
        .btn-google:hover { background-color: #357ae8; }
        .btn-salir { background-color: #e74c3c; width: auto; padding: 5px 10px; font-size: 12px; }
    </style>
</head>
<body>

<div class="contenedor">

    <!-- SESIÓN / LOGIN CON GOOGLE -->
    <div id="pantallaAuth">
        <h2>Acceso Comerciantes</h2>
        <p>Inicia sesión para administrar el catálogo de tu negocio.</p>
        <button id="btnLoginGoogle" class="btn-google">Ingresar con Google</button>
    </div>

    <!-- PANEL PRINCIPAL DEL COMERCIO -->
    <div id="pantallaComercio" class="oculto">
        <div class="barra-usuario">
            <span>Comercio: <strong id="txtEmailComercio"></strong></span>
            <button id="btnCerrarSesion" class="btn-salir">Cerrar Sesión</button>
        </div>

        <h2>Agregar Nuevo Producto</h2>
        <form id="formAgregarProducto">
            <div class="campo">
                <label for="nombreProd">Nombre del Producto</label>
                <input type="text" id="nombreProd" placeholder="Ej. Hamburguesa Doble con Queso" required />
            </div>

            <div class="campo">
                <label for="precioProd">Precio ($)</label>
                <input type="number" id="precioProd" step="0.01" placeholder="Ej. 120.00" required />
            </div>

            <div class="campo">
                <label for="descProd">Descripción</label>
                <textarea id="descProd" rows="3" placeholder="Ingredientes o detalles opcionales"></textarea>
            </div>

            <div class="campo">
                <label for="fotoProd">Foto del Producto</label>
                <input type="file" id="fotoProd" accept="image/*" required />
            </div>

            <button type="submit" id="btnGuardar">Publicar Producto</button>
        </form>

        <hr style="margin: 25px 0;">

        <h3>Mis Productos Registrados</h3>
        <div id="listaMisProductos">Cargando catálogo...</div>
    </div>

</div>

<script>
    // CONFIGURACIÓN DE SUPABASE
    const SUPABASE_URL = "https://jelhlxjbzbegntfyereb.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_2XGww5rHw0UQ7nvtcODg3A_w_r_hiit";
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ELEMENTOS DOM
    const pantallaAuth = document.getElementById('pantallaAuth');
    const pantallaComercio = document.getElementById('pantallaComercio');
    const btnLoginGoogle = document.getElementById('btnLoginGoogle');
    const btnCerrarSesion = document.getElementById('btnCerrarSesion');
    const formAgregarProducto = document.getElementById('formAgregarProducto');
    const btnGuardar = document.getElementById('btnGuardar');
    const listaMisProductos = document.getElementById('listaMisProductos');
    const txtEmailComercio = document.getElementById('txtEmailComercio');

    let usuarioComercio = null;

    // CONTROL DE AUTENTICACIÓN Y SESIÓN
    supabaseClient.auth.onAuthStateChange(async (event, session) => {
        if (session) {
            usuarioComercio = session.user;
            pantallaAuth.classList.add('oculto');
            pantallaComercio.classList.remove('oculto');
            txtEmailComercio.innerText = usuarioComercio.email;
            cargarMisProductos();
        } else {
            usuarioComercio = null;
            pantallaAuth.classList.remove('oculto');
            pantallaComercio.classList.add('oculto');
        }
    });

    btnLoginGoogle.addEventListener('click', async () => {
        await supabaseClient.auth.signInWithOAuth({ provider: 'google' });
    });

    btnCerrarSesion.addEventListener('click', async () => {
        await supabaseClient.auth.signOut();
    });

    // PUBLICACIÓN DE PRODUCTOS
    formAgregarProducto.addEventListener('submit', async (e) => {
        e.preventDefault();

        const fotoFile = document.getElementById('fotoProd').files[0];
        if (!fotoFile) {
            alert("Por favor selecciona una imagen del producto.");
            return;
        }

        btnGuardar.disabled = true;
        btnGuardar.innerText = "Subiendo imagen y guardando...";

        try {
            // 1. Subir Imagen a Supabase Storage (Bucket 'fotos-mercancia')
            const ext = fotoFile.name.split('.').pop();
            const fileName = `producto_${Date.now()}_${Math.random().toString(36).substring(7)}.${ext}`;

            const { data: uploadData, error: uploadErr } = await supabaseClient.storage
                .from('fotos-mercancia')
                .upload(fileName, fotoFile);

            if (uploadErr) throw uploadErr;

            // 2. Obtener URL Pública de la imagen
            const { data: urlData } = supabaseClient.storage
                .from('fotos-mercancia')
                .getPublicUrl(fileName);

            const fotoUrl = urlData.publicUrl;

            // 3. Guardar registro en la tabla 'productos'
            const { error: dbErr } = await supabaseClient
                .from('productos')
                .insert([
                    {
                        comercio_id: usuarioComercio.id,
                        nombre: document.getElementById('nombreProd').value,
                        precio: parseFloat(document.getElementById('precioProd').value),
                        descripcion: document.getElementById('descProd').value,
                        imagen: fotoUrl
                    }
                ]);

            if (dbErr) throw dbErr;

            alert("¡Producto publicado exitosamente!");
            formAgregarProducto.reset();
            cargarMisProductos();

        } catch (error) {
            alert("Error al registrar producto: " + error.message);
        } finally {
            btnGuardar.disabled = false;
            btnGuardar.innerText = "Publicar Producto";
        }
    });

    // OBTENER CATÁLOGO DEL COMERCIO
    async function cargarMisProductos() {
        listaMisProductos.innerHTML = "Cargando...";

        const { data: productos, error } = await supabaseClient
            .from('productos')
            .select('*')
            .eq('comercio_id', usuarioComercio.id)
            .order('created_at', { ascending: false });

        if (error) {
            listaMisProductos.innerHTML = "<p>Error al obtener productos.</p>";
            return;
        }

        if (!productos || productos.length === 0) {
            listaMisProductos.innerHTML = "<p>Aún no has registrado ningún producto.</p>";
            return;
        }

        listaMisProductos.innerHTML = "";
        productos.forEach(prod => {
            const item = document.createElement('div');
            item.className = 'tarjeta-prod';
            item.innerHTML = `
                <img src="${prod.imagen}" alt="${prod.nombre}">
                <div class="tarjeta-prod-info">
                    <strong>${prod.nombre}</strong><br>
                    <small>${prod.descripcion || 'Sin descripción'}</small><br>
                    <span style="color: #27ae60; font-weight: bold;">$${prod.precio.toFixed(2)}</span>
                </div>
            `;
            listaMisProductos.appendChild(item);
        });
    }
</script>

</body>
</html>
